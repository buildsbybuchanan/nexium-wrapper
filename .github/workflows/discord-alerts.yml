name: Discord Repository Alerts

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-discord:
    name: Discord notification
    runs-on: ubuntu-latest

    steps:
      - name: Send repository event to Discord
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured."
            exit 1
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"

          if [ "$EVENT_NAME" = "push" ]; then
            TITLE="Nexium Connect code pushed"
            DESCRIPTION="${COMMIT_MESSAGE:-New code was pushed to the repository.}"
            COLOR=3447003

            DETAILS=$(printf "**Event:** Push\n**Branch:** %s\n**Actor:** %s\n**Commit:** \`%s\`\n**Repository:** %s" \
              "$BRANCH" "$ACTOR" "$SHORT_SHA" "$REPOSITORY")

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            TITLE="Nexium Connect pull request ${EVENT_ACTION}"
            DESCRIPTION="${PR_TITLE:-Pull request activity detected.}"
            COLOR=10181046

            DETAILS=$(printf "**Event:** Pull request\n**Action:** %s\n**Pull request:** #%s\n**Actor:** %s\n**Repository:** %s" \
              "$EVENT_ACTION" "$PR_NUMBER" "$ACTOR" "$REPOSITORY")

          else
            TITLE="Nexium Connect workflow tested"
            DESCRIPTION="The Discord repository alert was triggered manually."
            COLOR=5763719

            DETAILS=$(printf "**Event:** Manual test\n**Branch:** %s\n**Actor:** %s\n**Repository:** %s" \
              "$BRANCH" "$ACTOR" "$REPOSITORY")
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --arg details "$DETAILS" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            '{
              username: "Nexium Connect",
              embeds: [
                {
                  title: $title,
                  description: $description,
                  url: $url,
                  color: $color,
                  fields: [
                    {
                      name: "Details",
                      value: $details,
                      inline: false
                    }
                  ],
                  footer: {
                    text: "Nexium Connect · GitHub Actions"
                  }
                }
              ]
            }')

          curl --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
